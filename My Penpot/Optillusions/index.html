<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Optillusions</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-900 text-slate-100 flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-slate-800/95 border border-slate-700 rounded-3xl p-8 shadow-2xl shadow-slate-950/40">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-semibold tracking-tight">Welcome Back</h1>
        <p class="mt-3 text-slate-400">Sign in to continue to Optillusions</p>
      </div>

      <form class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-300">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/20" placeholder="you@example.com"/>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/20" placeholder="Enter your password"/>
        </div>

        <div class="flex items-center justify-between text-sm text-slate-400">
          <label class="flex items-center gap-2"><input type="checkbox" class="h-4 w-4 rounded border-slate-600 bg-slate-900 text-cyan-500 focus:ring-cyan-500"/> Remember me</label>
          <a href="#" class="text-cyan-400 hover:text-cyan-300">Forgot password?</a>
        </div>

        <button type="submit" class="w-full rounded-2xl bg-cyan-500 px-4 py-3 text-sm font-semibold text-slate-950 transition hover:bg-cyan-400">Sign In</button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-400">New to Optillusions? <a href="#" class="font-medium text-cyan-400 hover:text-cyan-300">Create an account</a></p>
    </div>
  </body>
</html>
