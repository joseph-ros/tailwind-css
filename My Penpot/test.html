<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./output/output.css" />
    <title>Tailwind CSS - Coding the Grid Layout</title>
  </head>
  <body class="bg-[#26355D]">
    <section class="text-white">
      <div class="*:p-4 *:rounded m-2 grid grid-cols-4 grid-rows-3 gap-4">
        <p class="bg-cyan-600">Cyan</p>
        <p class="bg-green-600">Green</p>
        <p class="bg-zinc-600">Zinc</p>
        <p class="bg-orange-600">Orange</p>
        <p class="bg-purple-600">Purple</p>
        <p class="bg-blue-600">Blue</p>
        <p class="bg-yellow-600">Yellow</p>
        <p class="bg-emerald-600">Emerald</p>
        <p class="bg-rose-600">Rose</p>
        <p class="bg-pink-600">Pink</p>
        <p class="bg-slate-600">Slate Gray</p>
      </div>
    </section>
  </body>
</html>
