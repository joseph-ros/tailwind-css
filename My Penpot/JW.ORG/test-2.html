<!DOCTYPE html>
<html lang="en">
<head>

    <title>My Newsletter</title>
    <link rel="stylesheet" href="./output/output.css">
</head>
<body>
    <main class="flex flex-col items-center gap-y-4 xl:gap-y-12 md:border-2 md:border-purple-600/20 md:rounded md:p-8">
        <div class="text-center space-y-2">
            <h6 class="text-purple-600 text-2xl font-bold">My Newsletter</h6>
            <h1 class="text-3xl font-bold sm:text-4xl">Subscribe to my Newsletter</h1>
            <p class="text-lg">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Facilis corrupti molestias quam at earum! Vitae.</p>
        </div>
        <form class="w-full flex flex-col gap-6 shadow-md p-5 rounded md:flex-row *:rounded *:text-xl *:px-4 *:py-2" action="#">

            <input class="bg-purple-600 hover:bg-white text-white hover:text-purple-600 cursor-pointer" type="submit" value="Subscribe">
