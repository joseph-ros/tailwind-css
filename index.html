<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tailwind.config.js"></script>
        <script>
      tailwind.config = {
        darkMode: "selector"
      };
    </script>
    <title>Test</title>
  </head>
  <body class="flex flex-col items-center justify-center h-screen transition ease-in bg-slate-200 dark:bg-slate-800">
    <!-- Dark/Light Toggle Button -->
    <div class="fixed top-8 right-16">
      <input type="checkbox" class="bg-slate-300 dark:bg-slate-900 appearance-none h-8 w-16 rounded-full relative before:absolute before:h-8 before:w-8 before:bg-slate-900 dark:before:bg-slate-300 before:content-[''] before:rounded-full before:scale-110 checked:before:translate-x-8 checked:before:transition-all checked:before:duration-500 before:transition-all before:duration-500">
    </div>

      <!-- Card 1 -->
    <figure class="p-8 mb-8 mt-96 md:flex bg-slate-100 rounded-xl md:p-0 dark:bg-slate-900">
      <img class="object-cover w-full h-24 mx-auto md:w-48 md:h-auto" src="/.img/one-1.jpg" alt="Koenigsegg One:1" width="384" height="512">
      <div class="pt-6 space-y-4 text-center md:p-8 md:text-left">
        <blockquote>
          <p class="w-full max-w-md text-lg font-medium dark:text-white">The Koenigsegg One:1 was a groundbreaking, road-legal production car, famous for achieving a previously thought impossible 1:1 power-to-weight ratio—hence its name. It was also the world's first production megacar, generating one megawatt of power. The vehicle raised performance expectations with innovative solutions that enhanced track capabilities and top speed while maintaining everyday usability and aesthetics.</p>
        </blockquote>
        <figcaption class="font-medium">
          <div class="text-sky-500 dark:text-sky-400">Christian von Koenigsegg</div>
          <div class="text-slate-700 dark:text-slate-500">Founder & CEO, Koenigsegg Automotive AB</div>
        </figcaption>
      </div>
    </figure>
    
    <!-- Card 2 -->
    <figure class="p-8 mb-8 md:flex bg-slate-100 rounded-xl md:p-0 dark:bg-slate-900">
      <img class="object-cover w-full h-24 mx-auto md:w-48 md:h-auto" src="/.img/jesko-absolut.jpg" alt="Koenigsegg One:1" width="384" height="512">
      <div class="pt-6 space-y-4 text-center md:p-8 md:text-left">
        <blockquote>
          <p class="w-full max-w-md text-lg font-medium dark:text-white">The Jesko Absolut is a hypercar engineered for extreme top speed, featuring a sleek, drag-reducing design with dual rear fins instead of a wing, achieving an incredibly low drag coefficient (Cd 0.278) while maintaining 1600 horsepower for unmatched straight-line velocity beyond any previous homologated car. It sacrifices downforce for stability, using advanced simulations to predict "unbelievably fast" speeds.</p>
        </blockquote>
        <figcaption class="font-medium">
          <div class="text-sky-500 dark:text-sky-400">Christian von Koenigsegg</div>
          <div class="text-slate-700 dark:text-slate-500">Founder & CEO, Koenigsegg Automotive AB</div>
        </figcaption>
      </div>
    </figure>
    
    <!-- Card 3 -->
     <figure class="p-8 mb-8 md:flex bg-slate-100 rounded-xl md:p-0 dark:bg-slate-900">
      <img class="object-cover w-full h-24 mx-auto md:w-48 md:h-auto" src="/.img/gemera.jpg" alt="Koenigsegg One:1" width="384" height="512">
      <div class="pt-6 space-y-4 text-center md:p-8 md:text-left">
        <blockquote>
          <p class="w-full max-w-md text-lg font-medium dark:text-white">The Gemera is a groundbreaking "Mega-GT" that merges extreme, high-performance megacar capabilities with the practicality of a four-seater, including luggage space. It enables passengers to experience superior speed and comfort together, making it a unique, family-friendly, high-performance vehicle.</p>
        </blockquote>
        <figcaption class="font-medium">
          <div class="text-sky-500 dark:text-sky-400">Christian von Koenigsegg</div>
          <div class="text-slate-700 dark:text-slate-500">Founder & CEO, Koenigsegg Automotive AB</div>
        </figcaption>
      </div>
    </figure>
    
    <!-- Card 4 -->
     <figure class="p-8 mb-8 md:flex bg-slate-100 rounded-xl md:p-0 dark:bg-slate-900">
      <img class="object-cover w-full h-24 mx-auto md:w-48 md:h-auto" src="/.img/CC850.jpg" alt="Koenigsegg One:1" width="384" height="512">
      <div class="pt-6 space-y-4 text-center md:p-8 md:text-left">
        <blockquote>
          <p class="w-full max-w-md text-lg font-medium dark:text-white">The CC850 is the ideal combination of classic design and cutting-edge technology. Engineered to be the perfect driver's car, every innovation in the CC850 is designed to enhance the driving experience. The award-winning Engage Shift System (ESS) is one such innovation, providing both a gated 6-speed manual and a 9-speed automatic in the same transmission. The choice is yours!</p>
        </blockquote>
        <figcaption class="font-medium">
          <div class="text-sky-500 dark:text-sky-400">Christian von Koenigsegg</div>
          <div class="text-slate-700 dark:text-slate-500">Founder & CEO, Koenigsegg Automotive AB</div>
        </figcaption>
      </div>
    </figure>
    
    <!-- Card 5 -->
     <figure class="p-8 mb-8 md:flex bg-slate-100 rounded-xl md:p-0 dark:bg-slate-900">
      <img class="object-cover w-full h-24 mx-auto bg-left md:w-48 md:h-auto" src="/.img/regera.jpg" alt="Koenigsegg One:1" width="384" height="512">
      <div class="pt-6 space-y-4 text-center md:p-8 md:text-left">
        <blockquote>
          <p class="w-full max-w-md text-lg font-medium dark:text-white">The CC850 is the ideal combination of classic design and cutting-edge technology. Engineered to be the perfect driver's car, every innovation in the CC850 is designed to enhance the driving experience. The award-winning Engage Shift System (ESS) is one such innovation, providing both a gated 6-speed manual and a 9-speed automatic in the same transmission. The choice is yours!</p>
        </blockquote>
        <figcaption class="font-medium">
          <div class="text-sky-500 dark:text-sky-400">Christian von Koenigsegg</div>
          <div class="text-slate-700 dark:text-slate-500">Founder & CEO, Koenigsegg Automotive AB</div>
        </figcaption>
      </div>
    </figure>
  </body>
  <script>
    document.querySelector("input").addEventListener("click", () => {
      document.body.classList.toggle("dark");
    });
  </script>
</html>
